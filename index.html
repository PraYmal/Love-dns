<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<!-- Не даём поисковикам индексировать защищённую страницу -->
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Вход — Учёт перемещений</title>
<style>
  :root{
    --charcoal-950:#17171a; --charcoal-900:#1f2023; --charcoal-800:#2a2b2f;
    --charcoal-600:#4a4b52; --line:#3a3b40; --text:#eceef1; --text-dim:#9a9ba3;
    --orange:#ff6a1a; --red:#ff5d5d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--charcoal-950);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .box{
    background:var(--charcoal-900);border:1px solid var(--line);border-radius:14px;
    padding:32px 26px;max-width:340px;width:100%;text-align:center;
  }
  .logo-mark{
    width:48px;height:48px;border-radius:12px;margin:0 auto 16px;
    background:linear-gradient(135deg,var(--orange),#ff8a3d);
    display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#1a1005;font-size:18px;
  }
  h1{font-size:16px;margin:0 0 6px;}
  p.sub{color:var(--text-dim);font-size:13px;margin:0 0 20px;}
  input[type=password]{
    width:100%;padding:12px 14px;border-radius:8px;border:1px solid var(--charcoal-600);
    background:var(--charcoal-800);color:var(--text);font-size:15px;outline:none;text-align:center;
    letter-spacing:2px;
  }
  input[type=password]:focus{border-color:var(--orange);}
  button{
    width:100%;margin-top:12px;padding:12px;border-radius:8px;border:none;
    background:var(--orange);color:#1a1005;font-weight:700;font-size:14px;cursor:pointer;
  }
  button:disabled{opacity:.6;cursor:not-allowed;}
  .error{color:var(--red);font-size:13px;margin-top:10px;min-height:16px;}
</style>
</head>
<body>
  <div class="box">
    <div class="logo-mark">DNS</div>
    <h1>Учёт перемещений товара по ячейкам</h1>
    <p class="sub">Страница защищена паролем</p>
    <form id="pwForm">
      <input type="password" id="pwInput" placeholder="Пароль" autocomplete="off" autofocus>
      <button type="submit" id="pwBtn">Войти</button>
      <div class="error" id="pwError"></div>
    </form>
  </div>

function b64ToBytes(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function tryDecrypt(password){
  const enc = new TextEncoder();
  const salt = b64ToBytes(PAYLOAD.salt);
  const iv = b64ToBytes(PAYLOAD.iv);
  const data = b64ToBytes(PAYLOAD.data);

  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: PAYLOAD.iterations, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );

  // если пароль неверный, decrypt выбросит исключение (проверка подлинности GCM не пройдёт) —
  // это и есть настоящая проверка пароля, а не сравнение строк
  const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
  return new TextDecoder().decode(decrypted);
}

document.getElementById('pwForm').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = document.getElementById('pwBtn');
  const errEl = document.getElementById('pwError');
  const password = document.getElementById('pwInput').value;
  if(!password){ return; }
  btn.disabled = true;
  btn.textContent = 'Проверка...';
  errEl.textContent = '';
  try {
    const html = await tryDecrypt(password);
    document.open();
    document.write(html);
    document.close();
  } catch(err) {
    errEl.textContent = 'Неверный пароль';
    btn.disabled = false;
    btn.textContent = 'Войти';
  }
});
</script>
